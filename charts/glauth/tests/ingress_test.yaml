# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Ingress

templates:
  - ingress.yaml

tests:
  - it: Should not create Ingress
    set:
      ingress.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: Should render Ingress with non-default settings for Kubernetes >=1.19
    capabilities:
      majorVersion: 1
      minorVersion: 19
    set:
      ingress:
        enabled: true
        host: glauth
        paths:
          - path: /
            pathType: Prefix
        tls:
          - hosts:
              - glauth
            secretName: test
      secret.value.ldap.listen: 0.0.0.0:8080
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: apiVersion
          value: networking.k8s.io/v1
      - equal:
          path: spec.rules[0].host
          value: "glauth"
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: "/"
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Prefix
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 8080
      - equal:
          path: spec.tls[0].secretName
          value: test

  - it: Should render Ingress with default settings for Kubernetes >=1.19
    capabilities:
      majorVersion: 1
      minorVersion: 19
    set:
      ingress.enabled: true
      ingress.host: glauth.example.local
      ingress.paths:
        - path: /
          pathType: Prefix
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: apiVersion
          value: networking.k8s.io/v1
      - equal:
          path: spec.rules[0].host
          value: "glauth.example.local"
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: "/"
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Prefix
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 3893
      - notExists:
          path: spec.tls[0].secretName

  - it: Should use LDAPS listen port when LDAPS enabled
    capabilities:
      majorVersion: 1
      minorVersion: 19
    set:
      ingress.enabled: true
      ingress.host: ldaps.example.local
      ingress.paths:
        - path: /
          pathType: Prefix
      secret.value.ldaps.enabled: true
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 3894

  - it: Should prefer LDAPS over LDAP when both enabled
    capabilities:
      majorVersion: 1
      minorVersion: 19
    set:
      ingress.enabled: true
      ingress.host: both.example.local
      ingress.paths:
        - path: /
          pathType: Prefix
      secret.value.ldap.enabled: true
      secret.value.ldap.listen: 0.0.0.0:1389
      secret.value.ldaps.enabled: true
      secret.value.ldaps.listen: 0.0.0.0:1636
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 1636

  - it: Should use custom LDAPS listen port
    capabilities:
      majorVersion: 1
      minorVersion: 19
    set:
      ingress.enabled: true
      ingress.host: ldaps.example.local
      ingress.paths:
        - path: /
          pathType: Prefix
      secret.value.ldap.enabled: false
      secret.value.ldaps.enabled: true
      secret.value.ldaps.listen: 0.0.0.0:6636
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 6636

  - it: Should fail when neither LDAP nor LDAPS is enabled
    set:
      ingress.enabled: true
      ingress.host: fail.example.local
      ingress.paths:
        - path: /
      secret.value.ldap.enabled: false
      secret.value.ldaps.enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "Neither LDAP nor LDAPS is enabled, cannot determine service port for Ingress"

  - it: Should render ingressClassName if set and K8s >= 1.18
    capabilities:
      majorVersion: 1
      minorVersion: 18
    set:
      ingress.enabled: true
      ingress.className: nginx
      ingress.host: id.example.local
      ingress.paths:
        - path: /
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx

  - it: Should add legacy annotation for ingress.className on K8s < 1.18
    capabilities:
      majorVersion: 1
      minorVersion: 17
    set:
      ingress.enabled: true
      ingress.className: nginx
      ingress.host: legacy.example.local
      ingress.paths:
        - path: /
    asserts:
      - isKind:
          of: Ingress
      - isSubset:
          path: metadata.annotations
          content:
            kubernetes.io/ingress.class: nginx

  - it: Should use legacy apiVersion on Kubernetes 1.15
    capabilities:
      majorVersion: 1
      minorVersion: 15
    set:
      ingress.enabled: true
      ingress.host: legacy.example.com
      ingress.paths:
        - path: /
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: apiVersion
          value: networking.k8s.io/v1beta1

  - it: Should use extensions/v1beta1 on Kubernetes <1.14
    capabilities:
      majorVersion: 1
      minorVersion: 13
    set:
      ingress.enabled: true
      ingress.host: legacy-ext.example.com
      ingress.paths:
        - path: /
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: apiVersion
          value: extensions/v1beta1

  - it: Should render TLS section if defined
    capabilities:
      majorVersion: 1
      minorVersion: 19
    set:
      ingress.enabled: true
      ingress.host: tls.example.com
      ingress.paths:
        - path: /
          pathType: Prefix
      ingress.tls:
        - secretName: tls-secret
          hosts:
            - tls.example.com
      secret.value.ldaps.enabled: true
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: spec.tls[0].hosts[0]
          value: tls.example.com
      - equal:
          path: spec.tls[0].secretName
          value: tls-secret
