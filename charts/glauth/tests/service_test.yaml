# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Service

templates:
  - service.yaml

tests:
  - it: Should create service with defaults
    asserts:
      - isKind:
          of: Service
      - contains:
          path: spec.ports
          content:
            name: api
            port: 5555
            protocol: TCP
            targetPort: api
      - contains:
          path: spec.ports
          content:
            name: ldap
            port: 3893
            protocol: TCP
            targetPort: ldap
      - equal:
          path: spec.type
          value: ClusterIP

  - it: Should create service with given port
    set:
      secret.value.api.listen: 0.0.0.0:2047
      secret.value.ldap.listen: 0.0.0.0:2048
    asserts:
      - isKind:
          of: Service
      - contains:
          path: spec.ports
          content:
            name: api
            port: 2047
            protocol: TCP
            targetPort: api
      - contains:
          path: spec.ports
          content:
            name: ldap
            port: 2048
            protocol: TCP
            targetPort: ldap
      - equal:
          path: spec.type
          value: ClusterIP

  - it: Should create service with NodePort type
    set:
      service.type: NodePort
    asserts:
      - isKind:
          of: Service
      - contains:
          path: spec.ports
          content:
            name: api
            port: 5555
            protocol: TCP
            targetPort: api
      - contains:
          path: spec.ports
          content:
            name: ldap
            port: 3893
            protocol: TCP
            targetPort: ldap
      - equal:
          path: spec.type
          value: NodePort

  - it: Should render both ldap and ldaps ports when both enabled
    set:
      secret.value.ldap.enabled: true
      secret.value.ldaps.enabled: true
    asserts:
      - isKind:
          of: Service
      - contains:
          path: spec.ports
          content:
            name: ldap
            port: 3893
            protocol: TCP
            targetPort: ldap
      - contains:
          path: spec.ports
          content:
            name: ldaps
            port: 3894
            protocol: TCP
            targetPort: ldaps

  - it: Should render only ldaps port when only ldaps enabled
    set:
      secret.value.ldap.enabled: false
      secret.value.ldaps.enabled: true
    asserts:
      - isKind:
          of: Service
      - contains:
          path: spec.ports
          content:
            name: ldaps
            port: 3894
            protocol: TCP
            targetPort: ldaps
      - notContains:
          path: spec.ports
          content:
            name: ldap
            port: 3893
            protocol: TCP
            targetPort: ldap

  - it: Should fail when neither LDAP nor LDAPS is enabled
    set:
      secret.value.ldap.enabled: false
      secret.value.ldaps.enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "Neither LDAP nor LDAPS is enabled, at least one must be enabled for the Service"
