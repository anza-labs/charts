# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Reboot ServiceAccount

templates:
  - reboot-serviceaccount.yaml

tests:
  - it: Should not create ServiceAccount when reboot is disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: Should create ServiceAccount when enabled
    set:
      reboot.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-devenv-reboot
