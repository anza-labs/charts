# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Secret

templates:
  - secret-sshkeys.yaml

tests:
  - it: Should not create Secret when authorizedKeys is empty
    set:
      sshKeys.authorizedKeys: ""
    asserts:
      - hasDocuments:
          count: 0

  - it: Should not create Secret when existingSecret is set
    set:
      sshKeys.authorizedKeys: ssh-ed25519 key
      sshKeys.existingSecret: my-keys
    asserts:
      - hasDocuments:
          count: 0

  - it: Should create Secret with authorizedKeys
    set:
      sshKeys.authorizedKeys: ssh-ed25519 key
    asserts:
      - isKind:
          of: Secret
      - matchRegex:
          path: stringData.authorized_keys
          pattern: 'ssh-ed25519 key'
