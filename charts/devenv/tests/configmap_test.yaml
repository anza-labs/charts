# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: ConfigMap

templates:
  - configmap-bootstrap.yaml

tests:
  - it: Should create ConfigMap with default entrypoint
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-devenv-bootstrap
      - exists:
          path: data["entrypoint.sh"]

  - it: Should use custom bootstrap script when provided
    set:
      bootstrapScript: |
        #!/bin/sh
        echo custom
    asserts:
      - matchRegex:
          path: data["entrypoint.sh"]
          pattern: echo custom

  - it: Should include hook command, shell, and dotfiles loop logic
    asserts:
      - matchRegex:
          path: data["entrypoint.sh"]
          pattern: DOTFILES_HOOK_COMMAND
      - matchRegex:
          path: data["entrypoint.sh"]
          pattern: CORE_SHELL
      - matchRegex:
          path: data["entrypoint.sh"]
          pattern: 'for d in /etc/dotfiles/'
