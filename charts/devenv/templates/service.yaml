apiVersion: v1
kind: Service
metadata:
  name: {{ include "devenv.headlessService" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "devenv.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  clusterIP: None
  ports:
    - name: ssh
      port: 22
      targetPort: ssh
      protocol: TCP
  selector:
    {{- include "devenv.selectorLabels" . | nindent 4 }}
