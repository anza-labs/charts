# Update strategy for the StatefulSet.
updateStrategy:
  type: OnDelete

# -- Secrets for pulling images.
imagePullSecrets: []
# -- Override for the name.
nameOverride: ""
# -- Override for the full name.
fullnameOverride: ""

# Core container (Nixery)
core:
  image:
    # -- Registry and repository for the image (will have packages appended).
    repository: nixery.dev/shell
    # -- Image tag.
    tag: latest
    # -- Image pull policy.
    pullPolicy: IfNotPresent
    # -- Nixery packages to include (e.g. [go, rustc, cargo]).
    packages:
      - openssh
      - curl
      - git
      - ncurses
      - neovim
      - zsh
  # -- Login shell for the user (e.g. /bin/zsh).
  shell: "/bin/zsh"
  # -- Non-root username.
  user: devpod
  # -- Working directory.
  workingDir: /home/devpod
  # -- Resource requests and limits.
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi
  # -- Extra environment variables for the core container.
  env: []
  # -- Extra volume mounts for the core container.
  extraVolumeMounts: []
  # -- Extra directories to prepend to PATH (e.g. ["/home/devpod/.local/bin", "/home/devpod/.cargo/bin"]).
  extraPath: []

# Dotfiles source (optional)
dotfiles:
  git:
    image:
      # -- Registry and repository for the image (will have packages appended).
      repository: nixery.dev/shell/git
      # -- Image tag.
      tag: latest
      # -- Image pull policy.
      pullPolicy: IfNotPresent
    # -- Git repositories for dotfiles.
    repository:
      - name: .ohmyzsh
        repo: https://github.com/ohmyzsh/ohmyzsh.git
        revision: master

    # -- Optional command to run after dotfiles are cloned (e.g. "cd dotfiles && stow .").
    hookCommand: ""

# SSH public keys for SSH access
sshKeys:
  # -- Authorized public keys (one per line).
  authorizedKeys: ""
  # -- Name of an existing secret containing key "authorized_keys".
  existingSecret: ""

# Tailscale sidecar
tailscale:
  # -- Enable Tailscale sidecar for SSH access.
  enabled: true
  image:
    # -- Tailscale image repository.
    repository: docker.io/tailscale/tailscale
    # -- Tailscale image tag.
    tag: stable
    # -- Image pull policy.
    pullPolicy: IfNotPresent
  # -- Name of the secret containing TS_AUTHKEY.
  authKeySecret: tailscale-auth
  # -- Optional custom hostname (defaults to pod name).
  hostname: ""
  # -- Resource requests and limits.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  persistence:
    # -- Size for Tailscale state PVC.
    size: 256Mi
    # -- Storage class for Tailscale state PVC.
    storageClass: ""

# Docker-in-Docker sidecar (optional)
dind:
  # -- Enable Docker-in-Docker sidecar.
  enabled: false
  image:
    # -- DinD image repository.
    repository: docker.io/library/docker
    # -- DinD image tag.
    tag: dind
    # -- Image pull policy.
    pullPolicy: IfNotPresent
  # -- Run DinD in privileged mode.
  privileged: true
  # -- Docker storage size.
  storageSize: 30Gi
  # -- Resource requests and limits.
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi
  userNamespace:
    # -- Use user-namespace mode (requires kernel >=5.12).
    enabled: false
  persistence:
    # -- Docker storage PVC size.
    size: 30Gi
    # -- Storage class for Docker storage PVC.
    storageClass: ""

# Periodic reboot via CronJob (restarts StatefulSet on schedule).
reboot:
  # -- Enable weekly reboot CronJob (restarts on Sunday at midnight).
  enabled: false
  # -- Cron schedule expression (default: Sunday at midnight).
  schedule: "0 0 * * 0"
  image:
    # -- kubectl image repository.
    repository: nixery.dev/kubectl
    # -- Image tag.
    tag: latest
    # -- Image pull policy.
    pullPolicy: IfNotPresent
  # -- Resource requests and limits for the reboot Job pod.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Persistent storage sizes
persistence:
  home:
    # -- Enable home directory PVC.
    enabled: true
    # -- Home directory PVC size.
    size: 10Gi
    # -- Storage class for home PVC.
    storageClass: ""
    # -- Access modes for home PVC.
    accessModes:
      - ReadWriteOnce

# Pod security context
podSecurityContext: {}
#  fsGroup: 1000

# Container security context (core container)
containerSecurityContext: {}
#  runAsNonRoot: true
#  runAsUser: 1000

# -- Node selector for the pods.
nodeSelector:
  kubernetes.io/os: linux
  kubernetes.io/arch: amd64

# -- Tolerations for the pods.
tolerations: []

# -- Affinity settings for the pods.
affinity: {}

# HostPath for /dev/net/tun (required for Tailscale)
hostPathTun:
  # -- Enable hostPath mount for /dev/net/tun.
  enabled: true
  # -- Path to the TUN device.
  path: /dev/net/tun

# -- Custom bootstrap script (overrides the default).
bootstrapScript: ""

# -- Annotations to be added to the pods.
podAnnotations: {}
# -- Labels to be added to the pods.
podLabels: {}

service:
  # -- Annotations to add to the headless service.
  annotations: {}

serviceAccount:
  # -- Specifies whether a service account should be created.
  create: true
  # -- Automatically mount a ServiceAccount's API credentials.
  automount: true
  # -- Annotations to add to the service account.
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""
