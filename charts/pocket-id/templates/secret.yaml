{{- if .Values.secret.create -}}
{{- $encryptionKey := .Values.encryptionKey | required ".Values.encryptionKey is required." -}}
{{- $dbConnection := .Values.database.connectionString | required ".Values.database.connectionString is required." }}
{{- $validSqlitePrefix := "file:data/pocket-id.db" }}
{{- $validPostgresPrefixes := list "postgres://" "postgresql://" }}
{{- $isSqlite := hasPrefix $validSqlitePrefix $dbConnection }}
{{- $isPostgres := false }}
{{- range $prefix := $validPostgresPrefixes }}
  {{- if and (not $isPostgres) (hasPrefix $prefix $dbConnection) }}
    {{- $isPostgres = true }}
  {{- end }}
{{- end }}
{{- if and (not $isSqlite) (not $isPostgres) }}
  {{- fail (printf "Invalid database connectionString: %s. Must start with '%s' for SQLite or one of [%s] for PostgreSQL." $dbConnection $validSqlitePrefix (join ", " $validPostgresPrefixes)) }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pocket-id.secret" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pocket-id.labels" . | nindent 4 }}
type: Opaque
stringData:
  ENCRYPTION_KEY: "{{ $encryptionKey }}"
  {{- if .Values.staticApiKey }}
  STATIC_API_KEY: "{{ .Values.staticApiKey }}"
  {{- end }}
  {{- if .Values.maxmindLicenseKey }}
  MAXMIND_LICENSE_KEY: "{{ .Values.maxmindLicenseKey }}"
  {{- end }}
  DB_CONNECTION_STRING: "{{ $dbConnection }}"
  {{- if eq .Values.fileBackend.type "s3" }}
  S3_ACCESS_KEY_ID: "{{ .Values.fileBackend.s3.accessKeyId | required ".Values.fileBackend.s3.accessKeyId is required." }}"
  S3_SECRET_ACCESS_KEY: "{{ .Values.fileBackend.s3.secretAccessKey | required ".Values.fileBackend.s3.secretAccessKey is required." }}"
  {{- end }}
{{- end }}
