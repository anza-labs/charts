# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: StatefulSet

templates:
  - statefulset.yaml

tests:
  - it: Should use emptyDir if persistence is disabled
    set:
      persistence:
        data:
          enabled: false
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: RELEASE-NAME-pocket-id-data
            emptyDir: {}

  - it: Should use existing PVC if specified
    set:
      persistence:
        data:
          enabled: true
          existingClaim: test-claim
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: test-claim
            persistentVolumeClaim:
              claimName: test-claim
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: test-claim
            mountPath: /app/data
      - notExists:
          path: spec.volumeClaimTemplates

  - it: Should create volumeClaimTemplates if enabled and no existing claim is set
    set:
      persistence:
        data:
          enabled: true
          existingClaim: ""
          size: 1Gi
          accessMode: ReadWriteOnce
          storageClass: standard
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: RELEASE-NAME-pocket-id-data
      - contains:
          path: spec.volumeClaimTemplates
          any: true
          content:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 1Gi
              storageClassName: standard

  - it: Should not render volumeClaimTemplates when disabled
    set:
      persistence:
        data:
          enabled: false
    asserts:
      - notExists:
          path: spec.volumeClaimTemplates

  - it: Should mount data volume to main container
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: RELEASE-NAME-pocket-id-data
            mountPath: /app/data

  - it: Should include config volume when backup is enabled
    set:
      backup:
        enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            configMap:
              name: RELEASE-NAME-pocket-id-backup

  - it: Should include initContainer when backup is enabled
    set:
      backup:
        enabled: true
    asserts:
      - contains:
          path: spec.template.spec.initContainers
          any: true
          content: {}

  - it: Should use hostPath volume when hostPath is enabled
    set:
      persistence:
        data:
          hostPath:
            enabled: true
            path: /mnt/data
            type: DirectoryOrCreate
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: RELEASE-NAME-pocket-id-data
            hostPath:
              path: /mnt/data
              type: DirectoryOrCreate
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: RELEASE-NAME-pocket-id-data
            mountPath: /app/data
      - notExists:
          path: spec.volumeClaimTemplates

  - it: Should use hostPath volume without type when type is not set
    set:
      persistence:
        data:
          hostPath:
            enabled: true
            path: /mnt/data
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: RELEASE-NAME-pocket-id-data
            hostPath:
              path: /mnt/data
      - notExists:
          path: spec.volumeClaimTemplates

  - it: Should fail when hostPath is enabled and existingClaim is set
    set:
      persistence:
        data:
          existingClaim: my-claim
          hostPath:
            enabled: true
            path: /mnt/data
    asserts:
      - failedTemplate:
          errorMessage: "persistence.data.hostPath.enabled and persistence.data.existingClaim are mutually exclusive"

  - it: Should fail when hostPath is enabled and path is empty
    set:
      persistence:
        data:
          hostPath:
            enabled: true
            path: ""
    asserts:
      - failedTemplate:
          errorMessage: "persistence.data.hostPath.path must not be empty when persistence.data.hostPath.enabled is true"
