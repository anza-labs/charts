# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Secret

templates:
  - secret.yaml

tests:
  - it: Should fail for missing encryptionKey
    set: {}
    asserts:
      - failedTemplate:
          errorMessage: >-
            .Values.encryptionKey is required.

  - it: Should fail for invalid connection string
    set:
      encryptionKey: test-encryption-key
      database.connectionString: mysql://user:password@netloc:5432/postgres
    asserts:
      - failedTemplate:
          errorMessage: >-
            Invalid database connectionString: mysql://user:password@netloc:5432/postgres.
            Must start with 'file:data/pocket-id.db' for SQLite or one of [postgres://, postgresql://] for PostgreSQL.

  - it: Should not create Secret
    set:
      secret.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: Should create Secret with defaults
    set:
      encryptionKey: test-encryption-key
    asserts:
      - isKind:
          of: Secret
      - isSubset:
          path: stringData
          content:
            ENCRYPTION_KEY: test-encryption-key
            DB_CONNECTION_STRING: file:data/pocket-id.db

  - it: Should create secret for SQLite
    set:
      encryptionKey: test-encryption-key
      database.connectionString: file:data/pocket-id.db
    asserts:
      - isKind:
          of: Secret
      - isSubset:
          path: stringData
          content:
            ENCRYPTION_KEY: test-encryption-key
            DB_CONNECTION_STRING: file:data/pocket-id.db
      - isNotSubset:
          path: stringData
          content:
            MAXMIND_LICENSE_KEY: {}

  - it: Should create Secret for PostgreSQL (postgres://)
    set:
      encryptionKey: test-encryption-key
      database.connectionString: postgres://user:password@netloc:5432/postgres
    asserts:
      - isKind:
          of: Secret
      - isSubset:
          path: stringData
          content:
            ENCRYPTION_KEY: test-encryption-key
            DB_CONNECTION_STRING: postgres://user:password@netloc:5432/postgres
      - isNotSubset:
          path: stringData
          content:
            MAXMIND_LICENSE_KEY: {}

  - it: Should create Secret for PostgreSQL (postgresql://)
    set:
      encryptionKey: test-encryption-key
      database.connectionString: postgresql://user:password@netloc:5432/postgres
    asserts:
      - isKind:
          of: Secret
      - isSubset:
          path: stringData
          content:
            ENCRYPTION_KEY: test-encryption-key
            DB_CONNECTION_STRING: postgresql://user:password@netloc:5432/postgres
      - isNotSubset:
          path: stringData
          content:
            MAXMIND_LICENSE_KEY: {}

  - it: Should create Secret for SQLite with maxmind key
    set:
      encryptionKey: test-encryption-key
      database.connectionString: file:data/pocket-id.db
      maxmindLicenseKey: XXXXXXXXXXXXX
    asserts:
      - isKind:
          of: Secret
      - isSubset:
          path: stringData
          content:
            ENCRYPTION_KEY: test-encryption-key
            DB_CONNECTION_STRING: file:data/pocket-id.db
            MAXMIND_LICENSE_KEY: XXXXXXXXXXXXX

  - it: Should create Secret with S3 fileBackend
    set:
      encryptionKey: test-encryption-key
      database.connectionString: file:data/pocket-id.db
      fileBackend:
        type: s3
        s3:
          accessKeyId: AKIAIOSFODNN7EXAMPLE
          secretAccessKey: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          bucket: my-bucket
          endpoint: https://s3.amazonaws.com
    asserts:
      - isKind:
          of: Secret
      - isSubset:
          path: stringData
          content:
            ENCRYPTION_KEY: test-encryption-key
            DB_CONNECTION_STRING: file:data/pocket-id.db
            S3_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
            S3_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY

  - it: Should fail when S3 accessKeyId is missing
    set:
      encryptionKey: test-encryption-key
      database.connectionString: file:data/pocket-id.db
      fileBackend:
        type: s3
        s3:
          secretAccessKey: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          bucket: my-bucket
          endpoint: https://s3.amazonaws.com
    asserts:
      - failedTemplate:
          errorMessage: >-
            .Values.fileBackend.s3.accessKeyId is required.

  - it: Should fail when S3 secretAccessKey is missing
    set:
      encryptionKey: test-encryption-key
      database.connectionString: file:data/pocket-id.db
      fileBackend:
        type: s3
        s3:
          accessKeyId: AKIAIOSFODNN7EXAMPLE
          bucket: my-bucket
          endpoint: https://s3.amazonaws.com
    asserts:
      - failedTemplate:
          errorMessage: >-
            .Values.fileBackend.s3.secretAccessKey is required.

  - it: Should not include S3 credentials when fileBackend type is filesystem
    set:
      encryptionKey: test-encryption-key
      database.connectionString: file:data/pocket-id.db
      fileBackend:
        type: filesystem
        uploadPath: /data/uploads
    asserts:
      - isKind:
          of: Secret
      - isNotSubset:
          path: stringData
          content:
            S3_ACCESS_KEY_ID: {}
